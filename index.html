    function clearFloatingBalloon() {
      if (balloonState.frame) {
        cancelAnimationFrame(balloonState.frame);
      }

      if (balloonState.element) {
        balloonState.element.remove();
      }

      balloonState.active = false;
      balloonState.element = null;
      balloonState.frame = null;
      balloonState.lastTime = 0;
      updateCalendarCursorMode();
    }

    function renderFloatingBalloon() {
      if (!balloonState.element) {
        return;
      }

      const sway = Math.sin(performance.now() * 0.0025) * 4;
      const tilt = Math.max(-9, Math.min(9, balloonState.vx * 3.5));

      balloonState.element.style.left = `${balloonState.x}px`;
      balloonState.element.style.top = `${balloonState.y}px`;
      balloonState.element.style.transform =
        `translateX(${sway}px) rotate(${tilt}deg)`;
    }

    function animateFloatingBalloon(now) {
      if (!balloonState.active || !balloonState.element) {
        return;
      }

      const delta = balloonState.lastTime
        ? Math.min(2.2, (now - balloonState.lastTime) / 16.67)
        : 1;

      balloonState.lastTime = now;

      const elementRect = balloonState.element.getBoundingClientRect();
      const margin = 24;
      const minX = margin;
      const minY = margin;
      const maxX = window.innerWidth - margin - elementRect.width;
      const maxY = window.innerHeight - margin - elementRect.height;

      // Gentle buoyancy plus a small natural sideways drift.
      balloonState.vy -= 0.014 * delta;
      balloonState.vx += Math.sin(now * 0.0017) * 0.003 * delta;
      balloonState.vx *= Math.pow(0.996, delta);
      balloonState.vy *= Math.pow(0.998, delta);

      balloonState.x += balloonState.vx * delta;
      balloonState.y += balloonState.vy * delta;

      if (balloonState.x <= minX) {
        balloonState.x = minX;
        balloonState.vx = Math.abs(balloonState.vx) * 0.88 + 0.18;
      } else if (balloonState.x >= maxX) {
        balloonState.x = maxX;
        balloonState.vx = -Math.abs(balloonState.vx) * 0.88 - 0.18;
      }

      if (balloonState.y <= minY) {
        balloonState.y = minY;
        balloonState.vy = Math.abs(balloonState.vy) * 0.70 + 0.30;
      } else if (balloonState.y >= maxY) {
        balloonState.y = maxY;
        balloonState.vy = -Math.abs(balloonState.vy) * 0.78 - 0.25;
      }

      renderFloatingBalloon();
      balloonState.frame = requestAnimationFrame(animateFloatingBalloon);
    }

    function releaseBalloonFromCursor(event) {
      if (
        event.button !== 0 ||
        isCompactIndexMode ||
        balloonState.active ||
        isActionTarget(event.target) ||
        ufoImages[currentUfoIndex] !== "image-37.png"
      ) {
        return;
      }

      const cursorRect = cursorUfo.getBoundingClientRect();
      const balloon = document.createElement("img");

      balloon.className = "floating-balloon";
      balloon.src = "image-37.png";
      balloon.alt = "";
      balloon.draggable = false;

      document.body.appendChild(balloon);

      balloonState.active = true;
      balloonState.element = balloon;
      balloonState.x = cursorRect.left;
      balloonState.y = cursorRect.top;
      balloonState.vx = (Math.random() - 0.5) * 1.1;
      balloonState.vy = -1.25 - Math.random() * 0.45;
      balloonState.lastTime = 0;

      renderFloatingBalloon();
      updateCalendarCursorMode();
      balloonState.frame = requestAnimationFrame(animateFloatingBalloon);
    }

    function pushFloatingBalloonWithPointer() {
      if (!balloonState.active || !balloonState.element) {
        return;
      }

      const rect = balloonState.element.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const dx = centerX - mouseX;
      const dy = centerY - mouseY;
      const distance = Math.sqrt(dx * dx + dy * dy);
      const hitRadius = Math.max(rect.width, rect.height) * 0.56 + 10;
      const now = performance.now();

      if (distance >= hitRadius || now - balloonState.lastPushAt < 34) {
        return;
      }

      const safeDistance = Math.max(1, distance);
      const strength = (1 - distance / hitRadius) * 2.25 + 0.32;

      balloonState.vx += (dx / safeDistance) * strength;
      balloonState.vy += (dy / safeDistance) * strength - 0.16;
      balloonState.lastPushAt = now;
    }

    document.addEventListener("pointerdown", releaseBalloonFromCursor);

    function updateInfoPanelByImage(imageName) {
      if (archiveData[imageName]) {
        renderWorkDetail(archiveData[imageName]);
      } else {
        renderProfile();
      }
    }

function changeUfoImage() {
  const currentImage = ufoImages[currentUfoIndex];

  /*
    当前轮次全部抽完后，重新开启新一轮。
  */
  if (remainingUfoImages.length === 0) {
    remainingUfoImages = [...ufoImages];
  }

  /*
    避免新一轮第一张与当前正在显示的鼠标完全相同。
    第一轮初始状态是例外：
    image-13.png 允许在本轮之后再次出现一次，
    但也不需要第一次换图时立刻再次出现自己。
  */
  let availableImages = remainingUfoImages.filter(
    (imageName) => imageName !== currentImage
  );

  /*
    极端情况下池子里只剩当前图片，例如一轮的最后一步，
    此时允许抽取它，以保证这一轮完整结束。
  */
  if (availableImages.length === 0) {
    availableImages = [...remainingUfoImages];
  }

  let nextImage;

  /*
    保留你原有的 RSD 逻辑：
    当当前鼠标为 image-04.png 时，
    如果 image-05.png 在本轮还没有出现过，
    则仍然有 90% 概率紧接着显示 image-05.png。
  */
  const canPreferImage05 =
    currentImage === "image-04.png" &&
    availableImages.includes("image-05.png");

  if (canPreferImage05 && Math.random() < 0.9) {
    nextImage = "image-05.png";
  } else {
    const randomIndex = Math.floor(Math.random() * availableImages.length);
    nextImage = availableImages[randomIndex];
  }

  /*
    从本轮池子中删除已经显示过的鼠标。
    在剩余图片全部显示完之前，它不会再次出现。
  */
  remainingUfoImages = remainingUfoImages.filter(
    (imageName) => imageName !== nextImage
  );

  currentUfoIndex = ufoImages.indexOf(nextImage);
  hasChangedImageOnce = true;
  document.body.classList.remove("is-before-door");

  revealDesktopNavigationAfterFirstPlay();

  cursorUfo.src = nextImage;

  cursorUfo.classList.toggle(
    "is-impure-cursor",
    nextImage === "image-27.png"
  );

  cursorUfo.classList.toggle(
    "is-esc-cursor",
    nextImage === "image-25.png"
  );

  cursorUfo.classList.toggle(
    "is-tibetan-cursor",
    nextImage === "image-41.png"
  );

  cursorUfo.classList.toggle(
    "is-center-hotspot-cursor",
    nextImage === "image-45.png" || nextImage === "image-18.png"
  );

  cursorUfo.classList.toggle(
    "is-middle-left-hotspot-cursor",
    nextImage === "image-34.png" || nextImage === "image-35.png"
  );

  if (nextImage !== "image-18.png") {
    clearBigfootFootprints();
  }

  if (nextImage !== "image-37.png") {
    clearFloatingBalloon();
  }

  if (!isListView && !isCompactIndexMode) {
    savedPlaygroundImage = nextImage;
  }

  updateInfoPanelByImage(nextImage);
  updateCalendarCursorMode();
}

    function updateCalendarCursorMode() {
      const currentImage = ufoImages[currentUfoIndex];
      const isCalendarImage = currentImage === "image-46.png";
      const panelRect = infoWrap.getBoundingClientRect();
      const isInsideLeftPanel =
        mouseX >= panelRect.left &&
        mouseX <= panelRect.right &&
        mouseY >= panelRect.top &&
        mouseY <= panelRect.bottom;

      const isReleasedBalloon =
        balloonState.active && currentImage === "image-37.png";

      const shouldUseDot =
        isListView || (isCalendarImage && isInsideLeftPanel) || isReleasedBalloon;

      cursorUfo.classList.toggle("is-hidden-for-dot", shouldUseDot);
      cursorDot.classList.toggle("is-active", shouldUseDot);
    }

    function requestStripRender() {
      if (stripMotionFrame) {
        return;
      }

      stripMotionFrame = requestAnimationFrame(() => {
        stripMotionFrame = null;
        renderStripMotion();
      });
    }

    function renderStripMotion() {
      stripLetters.forEach((letter, index) => {
        const y = stripScrollOffset[index] + stripAvoidOffset[index];
        letter.style.transform = `translate3d(0, ${y}px, 0) rotate(20deg)`;
      });
    }

    function updateStripAvoidance() {
      stripAvoidanceFrame = null;

      const cursorRadius = 190;
      const maxPush = 130;

      stripLetters.forEach((letter, index) => {
        const rect = letter.getBoundingClientRect();
        const letterCenterY = rect.top + rect.height / 2;
        const letterCenterX = rect.left + rect.width / 2;

        const dx = mouseX - letterCenterX;
        const dy = mouseY - letterCenterY;
        const distance = Math.sqrt(dx * dx + dy * dy);

        let push = 0;

        if (distance < cursorRadius) {
          const strength = 1 - distance / cursorRadius;
          push = dy > 0 ? -maxPush * strength : maxPush * strength;
        }

        stripAvoidOffset[index] = push;
      });

      requestStripRender();
    }

    function scheduleStripAvoidance() {
      if (stripAvoidanceFrame) {
        return;
      }

      stripAvoidanceFrame = requestAnimationFrame(updateStripAvoidance);
    }

    function updateStripFromScroll(currentScrollTop) {
      const speed = currentScrollTop - lastScrollTop;

      stripLetters.forEach((letter, index) => {
        const center = (stripLetters.length - 1) / 2;
        const distanceFromCenter = index - center;

        const unevenPull =
          speed * 0.38 +
          Math.sin(index * 1.7) * speed * 0.22 -
          distanceFromCenter * Math.abs(speed) * 0.09;

        stripScrollOffset[index] = Math.max(-56, Math.min(56, unevenPull));
      });

      lastScrollTop = currentScrollTop;
      requestStripRender();
    }

    infoPanel.addEventListener("scroll", () => {
      pendingStripScrollTop = infoPanel.scrollTop;

      if (!stripMotionFrame) {
        stripMotionFrame = requestAnimationFrame(() => {
          stripMotionFrame = null;
          updateStripFromScroll(pendingStripScrollTop);
        });
      }

      clearTimeout(stripBrakeTimer);

      stripBrakeTimer = setTimeout(() => {
        stripScrollOffset = stripScrollOffset.map(() => 0);
        requestStripRender();
      }, 95);
    }, { passive: true });

    document.addEventListener("mousemove", (event) => {
      pointerMovedSinceDoorCheck = true;
      mouseX = event.clientX;
      mouseY = event.clientY;

      cursorUfo.style.left = `${mouseX}px`;
      cursorUfo.style.top = `${mouseY}px`;
      cursorDot.style.left = `${mouseX}px`;
      cursorDot.style.top = `${mouseY}px`;

      updateCalendarCursorMode();
      scheduleStripAvoidance();
      pushFloatingBalloonWithPointer();
    });

    function measureDoorArea() {
      const leftRect = leftDoor.getBoundingClientRect();
      const rightRect = rightDoor.getBoundingClientRect();

      return {
        left: leftRect.left,
        right: rightRect.right,
        top: Math.min(leftRect.top, rightRect.top),
        bottom: Math.max(leftRect.bottom, rightRect.bottom)
      };
    }

    function getDoorArea() {
      if (!cachedDoorArea) {
        cachedDoorArea = measureDoorArea();
      }

      return cachedDoorArea;
    }

    function invalidateDoorArea() {
      cachedDoorArea = null;
    }

    window.addEventListener("resize", invalidateDoorArea, { passive: true });

    function checkDoorPass() {
      if (isListView || isCompactIndexMode) {
        pointerMovedSinceDoorCheck = false;
        wasInsideDoor = false;
        lastMouseY = mouseY;
        return;
      }

      if (!pointerMovedSinceDoorCheck) {
        return;
      }

      const area = getDoorArea();

      const insideDoor =
        mouseX > area.left &&
        mouseX < area.right &&
        mouseY > area.top &&
        mouseY < area.bottom;

      const now = performance.now();

      if (
        pointerMovedSinceDoorCheck &&
        insideDoor &&
        !wasInsideDoor &&
        now - lastHitTime > 180
      ) {
        const directionY = mouseY - lastMouseY;

        if (directionY < 0) {
          leftVelocity += 18;

          setTimeout(() => {
            rightVelocity -= 15;
          }, 45);
        } else if (directionY > 0) {
          leftVelocity -= 18;

          setTimeout(() => {
            rightVelocity += 15;
          }, 45);
        }

        if (!doorChangeTimer) {
          doorChangeTimer = window.setTimeout(() => {
            doorChangeTimer = null;

            if (!isListView && !isCompactIndexMode) {
              changeUfoImage();
            }
          }, 55);
        }

        lastHitTime = now;
      }

      pointerMovedSinceDoorCheck = false;
      wasInsideDoor = insideDoor;
      lastMouseY = mouseY;
    }

    function animate() {
      checkDoorPass();

      const spring = 0.028;
      const friction = 0.955;

      leftVelocity += (0 - leftAngle) * spring;
      leftVelocity *= friction;
      leftAngle += leftVelocity;

      rightVelocity += (0 - rightAngle) * (spring * 0.92);
      rightVelocity *= friction * 0.998;
      rightAngle += rightVelocity;

      leftAngle = Math.max(-75, Math.min(75, leftAngle));
      rightAngle = Math.max(-75, Math.min(75, rightAngle));

      leftDoor.style.transform = `rotateY(${leftAngle}deg)`;
      rightDoor.style.transform = `rotateY(${rightAngle}deg)`;

      requestAnimationFrame(animate);
    }

    renderWorksList();
    savedPlaygroundImage = ufoImages[currentUfoIndex];
    syncDiscoveredDesktopNavigation();
    updateResponsiveExperience();

    if (!isCompactIndexMode) {
      renderProfile();
    }

    updateCalendarCursorMode();
    animate();
  

/* === V9 ROBUST TOP BUTTON OVERRIDE === */
(function () {
  function bmpScrollTargets() {
    const base = [
      window.infoPanel || document.querySelector("#infoPanel"),
      document.querySelector(".info-panel"),
      document.querySelector(".info-wrap"),
      document.querySelector(".work-detail"),
      document.scrollingElement,
      document.documentElement,
      document.body
    ].filter(Boolean);

    const wrap = document.querySelector(".info-wrap") || document.body;
    const inner = Array.from(wrap.querySelectorAll("*"))
      .filter((element) => element.scrollHeight > element.clientHeight + 3)
      .slice(0, 16);

    return Array.from(new Set(base.concat(inner)));
  }

  function setTop(target, top) {
    try {
      target.scrollTop = top;
      target.scrollLeft = 0;
    } catch (error) {}
  }

  function bmpAnimateToTop() {
    const targets = bmpScrollTargets();
    const starts = targets.map((target) => ({
      target,
      top: Number(target.scrollTop || 0)
    }));

    const windowStart = Number(window.scrollY || 0);
    const maxTop = Math.max(windowStart, ...starts.map((item) => item.top));

    if (maxTop <= 1) {
      starts.forEach((item) => setTop(item.target, 0));
      try { window.scrollTo(0, 0); } catch (error) {}
      return;
    }

    const duration = 520;
    const startedAt = performance.now();
    const ease = (t) => 1 - Math.pow(1 - t, 3);

    function frame(now) {
      const p = Math.min(1, (now - startedAt) / duration);
      const k = 1 - ease(p);

      starts.forEach((item) => {
        setTop(item.target, Math.round(item.top * k));
      });

      try {
        window.scrollTo(0, Math.round(windowStart * k));
      } catch (error) {}

      if (p < 1) {
        requestAnimationFrame(frame);
      } else {
        starts.forEach((item) => setTop(item.target, 0));
        try { window.scrollTo(0, 0); } catch (error) {}
      }
    }

    requestAnimationFrame(frame);
  }

  window.scrollWorkToTop = function (event) {
    if (event) {
      event.preventDefault();
      event.stopPropagation();
    }
    bmpAnimateToTop();
  };

  function topHandler(event) {
    const button = event.target.closest("#mobileWorkTopButton, .work-top-button");
    if (!button) {
      return;
    }
    window.scrollWorkToTop(event);
  }

  document.addEventListener("click", topHandler, true);
  document.addEventListener("pointerup", topHandler, true);
})();

/* === V32 / MOBILE HOME ME.PNG CLICK POP LOGIC === */
(function () {
  let mobileMePopTimer = null;

  function canShowMobileMePop() {
    return (
      document.body.classList.contains("is-compact-index") &&
      !document.body.classList.contains("is-compact-work-open")
    );
  }

  function removeMobileMePop() {
    const old = document.querySelector(".mobile-me-pop");
    if (old) {
      old.remove();
    }

    if (mobileMePopTimer) {
      clearTimeout(mobileMePopTimer);
      mobileMePopTimer = null;
    }
  }

  function showMobileMePop() {
    if (!canShowMobileMePop()) {
      return;
    }

    removeMobileMePop();

    const imageWidth = 54;
    const imageHeight = 82;
    const safeMargin = 28;
    const maxLeft = Math.max(safeMargin, window.innerWidth - imageWidth - safeMargin);
    const maxTop = Math.max(safeMargin, window.innerHeight - imageHeight - safeMargin);

    const left = safeMargin + Math.random() * Math.max(1, maxLeft - safeMargin);
    const top = safeMargin + Math.random() * Math.max(1, maxTop - safeMargin);
    const rotation = -14 + Math.random() * 28;

    const img = document.createElement("img");
    img.className = "mobile-me-pop";
    img.src = "me.png";
    img.alt = "";
    img.draggable = false;
    img.setAttribute("aria-hidden", "true");
    img.style.left = `${left}px`;
    img.style.top = `${top}px`;
    img.style.transform = `rotate(${rotation}deg)`;

    document.body.appendChild(img);

    mobileMePopTimer = window.setTimeout(() => {
      removeMobileMePop();
    }, 3200);
  }

  document.addEventListener("click", (event) => {
    const trigger = event.target.closest(".mobile-me-trigger");
    if (!trigger) {
      return;
    }

    event.preventDefault();
    event.stopPropagation();
    showMobileMePop();
  });

  document.addEventListener("keydown", (event) => {
    const trigger = event.target.closest(".mobile-me-trigger");
    if (!trigger) {
      return;
    }

    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      showMobileMePop();
    }
  });

  const observer = new MutationObserver(() => {
    if (!canShowMobileMePop()) {
      removeMobileMePop();
    }
  });

  observer.observe(document.body, {
    attributes: true,
    attributeFilter: ["class"]
  });
})();
