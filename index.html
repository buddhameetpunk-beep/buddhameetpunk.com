    .page-footprint {

      transition: opacity 0.22s ease;

      from {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.82) rotate(var(--footprint-rotation, 0deg));
      }
      to {
        opacity: 0.96;

.impure-reveal-list {
  width: 100%;

}

.impure-reveal-item {

}

.impure-reveal-card {
  position: relative;
  display: block;
  width: 100%;
  overflow: hidden;
  border: 2px solid #111;
  background: #000;
  touch-action: none;
}

.impure-reveal-base,
.impure-reveal-hidden {
  display: block;
  width: 100%;
  height: auto;
}

.impure-reveal-hidden {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.22s ease;

  -webkit-mask-image: radial-gradient(
    circle var(--reveal-radius, 115px) at var(--reveal-x, 50%) var(--reveal-y, 50%),
    rgba(0, 0, 0, 1) 0%,
    rgba(0, 0, 0, 1) 38%,
    rgba(0, 0, 0, 0.72) 62%,
    rgba(0, 0, 0, 0) 100%
  );

  mask-image: radial-gradient(
    circle var(--reveal-radius, 115px) at var(--reveal-x, 50%) var(--reveal-y, 50%),
    rgba(0, 0, 0, 1) 0%,
    rgba(0, 0, 0, 1) 38%,
    rgba(0, 0, 0, 0.72) 62%,
    rgba(0, 0, 0, 0) 100%
  );

  -webkit-mask-repeat: no-repeat;
  mask-repeat: no-repeat;
}

.impure-reveal-card.is-active .impure-reveal-hidden {
  opacity: 1;
}

.impure-reveal-light {
  position: absolute;
  left: var(--reveal-x, 50%);
  top: var(--reveal-y, 50%);
  width: calc(var(--reveal-radius, 115px) * 2.25);
  height: calc(var(--reveal-radius, 115px) * 2.25);
  transform: translate(-50%, -50%);
  border-radius: 50%;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s ease;
  background: radial-gradient(
    circle,
    rgba(88, 70, 255, 0.10) 0%,
    rgba(67, 47, 244, 0.06) 42%,
    rgba(67, 47, 244, 0) 74%
  );
  mix-blend-mode: screen;
}

.impure-reveal-card.is-active .impure-reveal-light {
  opacity: 1;
}

      left: 0;
      top: 0;
      color: var(--work-color);
      -webkit-text-stroke: 4px var(--work-outline, #111);
      z-index: 1;
    }

    .work-title-fill {
      position: relative;
      color: var(--work-color);
      -webkit-text-stroke: 0;
      z-index: 2;
    }

    /* =========================
       META TABLE
    ========================= */

    .work-meta {
      border-top: 1px solid #111;
      margin-bottom: 48px;
    }

    .work-meta-row {
      display: grid;
      grid-template-columns: 34% 66%;
      min-height: 52px;
      border-bottom: 1px solid #111;
      align-items: center;
      font-size: 15px;
      line-height: 1.35;
    }

    .work-meta-label {
      font-weight: 400;
    }

    .work-meta-value {
      font-weight: 400;
    }

    .work-meta-row.concept {
      align-items: start;
      padding: 15px 0;
    }

    .work-meta-row.concept .work-meta-value {
      line-height: 1.5;
    }

    /* =========================
       DIVIDER
    ========================= */

    .divider {
      width: 1px;
      height: 100%;
      background: #111;
    }

    /* =========================
       RIGHT DOOR PANEL
    ========================= */

    .door-panel {
      height: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 600px;
      position: relative;
      container-type: inline-size;
      container-name: doorpanel;
    }

    .door-guide {
      position: absolute;
      left: 36px;
      top: 36px;
      height: 40px;
      display: flex;
      align-items: center;
    }

    .site-status {
      position: absolute;
      left: 36px;
      bottom: 36px;
      font-size: 18px;
      line-height: 1.15;
      font-weight: 400;
    }

    .site-status-line {
      display: block;
    }

    .site-status a {
      color: inherit;
      text-decoration: none;
    }

    .copy-target {
      display: inline-block;
      color: inherit;
      text-decoration: none;
      cursor: none;
      user-select: none;
    }

    .copy-target:hover,
    .copy-target:focus-visible {
      text-decoration-line: underline;
      text-decoration-thickness: 3px;
      text-underline-offset: 5px;
      outline: none;
    }

    .copy-target.is-copied,
    .copy-target.is-copied:hover,
    .copy-target.is-copied:focus-visible {
      text-decoration: none;
    }

    .door-guide span {
      display: inline-block;
      padding-bottom: 2px;
      border-bottom: 1px solid #111;
    }

    .door-word {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #000000;
      transform-style: preserve-3d;
    }

    .letter,
    .door,
    .solid-o span {
      font-family: "Arial Rounded MT Bold", "Arial Rounded", Arial, sans-serif;
      font-size: 180px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      user-select: none;
    }

    .door {
      width: 0.58em;
      height: 1em;
      text-align: center;
      position: relative;
      display: inline-block;
      transform-style: preserve-3d;
      backface-visibility: visible;
    }

    .solid-o {
      position: relative;
      display: inline-block;
      width: 100%;
      height: 1em;
      transform-style: preserve-3d;
    }

    .solid-o span {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 1em;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      color: #000;
      backface-visibility: visible;
    }

    .solid-o span:nth-child(1) { transform: translateZ(0px); }
    .solid-o span:nth-child(2) { transform: translateZ(-2px); }
    .solid-o span:nth-child(3) { transform: translateZ(-4px); }
    .solid-o span:nth-child(4) { transform: translateZ(-6px); }
    .solid-o span:nth-child(5) { transform: translateZ(-8px); }
    .solid-o span:nth-child(6) { transform: translateZ(-10px); }

    .left-door {
      transform-origin: left center;
    }

    .right-door {
      transform-origin: right center;
    }

    .door-word,
    .left-door,
    .right-door,
    .solid-o {
      will-change: transform;
      transform-style: preserve-3d;
    }

    .left-door,
    .right-door {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    /* =========================
       CUSTOM CURSOR
    ========================= */

    .cursor-ufo {
      position: fixed;
      left: 0;
      top: 0;
      width: 120px;
      height: auto;
      transform: translate(-50%, -85%);
      pointer-events: none;
      z-index: 9999;
      user-select: none;
      transition: opacity 0.08s ease;
    }

    .cursor-helper-dot {
      position: fixed;
      left: 0;
      top: 0;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #111111;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10000;
      user-select: none;
      opacity: 0;
      transition: opacity 0.08s ease;
    }

    .cursor-ufo.is-hidden-for-dot {
      opacity: 0;
    }

    .cursor-helper-dot.is-active {
      opacity: 1;
    }

    /* image-27 / image-25 / image-41: the real pointer aligns with the upper-left area */
    .cursor-ufo.is-impure-cursor,
    .cursor-ufo.is-esc-cursor,
    .cursor-ufo.is-tibetan-cursor {
      transform: translate(-18%, -18%);
    }

    /* image-45 / image-18: click point at the visual center. */
    .cursor-ufo.is-center-hotspot-cursor {
      transform: translate(-50%, -50%);
    }

    /* image-34 / image-35: click point at the visual middle-left. */
    .cursor-ufo.is-middle-left-hotspot-cursor {
      transform: translate(-18%, -50%);
    }

    @media (max-width: 900px) {
      .main {
        grid-template-columns: clamp(330px, 42vw, 380px) 1px minmax(0, 1fr);

      .intro-line {

      }

      .work-title-stroke,
      .work-title-fill {

      .letter,

      }

        /* =========================

    .door-guide,
    .site-status,
    .work-top-button {

      font-weight: 400;
    }

        .door-guide span {

    }

        /* =========================

    .profile-home:has(.intro-line) .intro-block {
      margin-top: auto;
      margin-bottom: 0;
    }

    .profile-home:has(.intro-line) .intro-line:last-child {

    }

        /* =========================
       JAPANESE PROFILE GREETING
    ========================= */

    .profile-top-row.is-japanese {
      height: auto;
      min-height: 40px;
      align-items: flex-start;
    }

        /* =========================
       ALIGN GOLD IG WITH SITE STATUS

    .gold-work-view {

      min-height: 100%;
      padding-bottom: 0;
      display: flex;
      flex-direction: column;

    .gold-work-view .profile-home {

    }

    .gold-work-view .intro-block {
      margin-top: auto;
      margin-bottom: 0;
    }

    .gold-work-view .intro-line:last-child {
      margin-bottom: 0;
    }

        /* =========================
       THICK UTILITY UNDERLINES
    ========================= */

    .door-guide span {
      padding-bottom: 4px;
    }


    /* =========================
       FIXED SINGLE-LINE GREETING AREA
    ========================= */

    .profile-home .profile-top-row {
      height: 40px;
      min-height: 40px;
      align-items: center;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .profile-home .profile-top-row.is-japanese {
      height: 40px;
      min-height: 40px;
      align-items: center;
      letter-spacing: -0.045em;
    }

    .profile-home .profile-top-row.is-tibetan {
      height: 40px;

    }



    /* =========================
       INTERACTIVE CALENDAR / IMAGE-46
    ========================= */

    .calendar-work-view {
      position: relative;
      min-height: 100%;
      padding-bottom: 80px;
      display: block;
    }

    .calendar-work-view .work-close-row,
    .calendar-control-row {
      position: relative;
      z-index: 60;
    }

    .calendar-work-view .work-top-button {
      position: fixed !important;
      left: 60px !important;
      bottom: 60px !important;
      display: inline-block;
      width: max-content;
      margin-top: 0;
      z-index: 120;
      color: #ffffff;
      mix-blend-mode: difference;
    }

    .calendar-control-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin: 12px 0 22px;
      font-size: 32px;
      line-height: 1.08;
      font-weight: 400;
    }

    .calendar-control-hint {
      max-width: 70%;
      color: #111;
    }

    .calendar-reset {
      display: inline-block;
      flex: 0 0 auto;
      padding-bottom: 4px;
      border-bottom: 3px solid currentColor;
      cursor: none;
      user-select: none;
    }

    /* This is only a vertical space holder. The papers themselves may travel
       over the entire left-column content below the BACK / TOP controls. */
    .calendar-stage {
      position: relative;
      display: block;
      width: 100%;
      height: 610px;
      margin-bottom: 24px;
      pointer-events: none;
      user-select: none;
    }

    .calendar-surface {
      position: absolute;
      inset: 0;
      z-index: 10;
      overflow: visible;
      perspective: 1250px;
      touch-action: none;
      background: transparent;
    }

    .calendar-page {
      position: absolute;
      width: min(64%, 306px);
      transform-origin: center center;
      will-change: left, top, transform;
      touch-action: none;
      cursor: none;
    }

    .calendar-page.is-pair {
      width: min(94%, 452px);
    }

    .calendar-sheet {
      position: relative;
      display: block;
      width: 100%;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.08));
      will-change: filter;
    }

    .calendar-page.is-pair .calendar-sheet {
      filter: drop-shadow(0 3px 3px rgba(0, 0, 0, 0.10));
    }

    .calendar-page.is-partially-peeled .calendar-sheet,
    .calendar-page.is-peeling .calendar-sheet {
      filter: drop-shadow(8px 13px 13px rgba(0, 0, 0, 0.18));
    }

    .calendar-page.is-detached .calendar-sheet,
    .calendar-page.is-selected .calendar-sheet {
      filter: drop-shadow(6px 9px 10px rgba(0, 0, 0, 0.16));
    }

    .calendar-page-images {
      display: flex;
      align-items: flex-start;
      gap: 0;
      width: 100%;
    }

    .calendar-page-image {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .calendar-page.is-pair .calendar-page-image {
      width: 50%;
    }

    .calendar-page-images.is-base {
      position: relative;
      z-index: 1;
    }

    /* The base paper is cut away only at the part actually being lifted,
       so the dragged corner no longer behaves like the opposite side of a seesaw. */
    .calendar-page.peel-bl .calendar-page-images.is-base {
      clip-path: polygon(
        0 0,
        100% 0,
        100% 100%,
        var(--fold-size, 0px) 100%,
        0 calc(100% - var(--fold-size, 0px))
      );
    }

    .calendar-page.peel-br .calendar-page-images.is-base {
      clip-path: polygon(
        0 0,
        100% 0,
        100% calc(100% - var(--fold-size, 0px)),
        calc(100% - var(--fold-size, 0px)) 100%,
        0 100%
      );
    }

    .calendar-page.peel-b .calendar-page-images.is-base {
      clip-path: polygon(
        0 0,
        100% 0,
        100% calc(100% - var(--fold-height, 0px)),
        0 calc(100% - var(--fold-height, 0px))
      );
    }

    .calendar-fold-flap {
      position: absolute;
      inset: 0;
      z-index: 3;
      opacity: 0;
      pointer-events: none;
      transform-style: preserve-3d;
      backface-visibility: visible;
      transition: opacity 0.08s ease;
    }

    .calendar-page.is-peeling .calendar-fold-flap,
    .calendar-page.is-partially-peeled .calendar-fold-flap {
      opacity: 1;
    }

    .calendar-page.peel-bl .calendar-fold-flap {
      clip-path: polygon(
        0 100%,
        var(--fold-size, 0px) 100%,
        0 calc(100% - var(--fold-size, 0px))
      );
      transform-origin: var(--fold-size, 0px) calc(100% - var(--fold-size, 0px));
      transform:
        translate(var(--peel-shift-x, 0px), var(--peel-shift-y, 0px))
        perspective(900px)
        rotateX(var(--flap-x, 0deg))
        rotateY(var(--flap-y, 0deg));
    }

    .calendar-page.peel-br .calendar-fold-flap {
      clip-path: polygon(
        100% 100%,
        calc(100% - var(--fold-size, 0px)) 100%,
        100% calc(100% - var(--fold-size, 0px))
      );
      transform-origin: calc(100% - var(--fold-size, 0px)) calc(100% - var(--fold-size, 0px));
      transform:
        translate(var(--peel-shift-x, 0px), var(--peel-shift-y, 0px))
        perspective(900px)
        rotateX(var(--flap-x, 0deg))
        rotateY(var(--flap-y, 0deg));
    }

    /* Pulling the bottom edge lifts a horizontal strip, intentionally distinct
       from the triangular corner-curl motion. */
    .calendar-page.peel-b .calendar-fold-flap {
      clip-path: polygon(
        0 calc(100% - var(--fold-height, 0px)),
        100% calc(100% - var(--fold-height, 0px)),
        100% 100%,
        0 100%
      );
      transform-origin: center calc(100% - var(--fold-height, 0px));
      transform:
        translateY(var(--peel-shift-y, 0px))
        perspective(900px)
        rotateX(var(--flap-x, 0deg));
    }

    .calendar-fold-shade {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: var(--fold-opacity, 0);
    }

    .calendar-page.peel-bl .calendar-fold-shade {
      background: radial-gradient(
        circle at left bottom,
        rgba(0, 0, 0, 0.20) 0%,
        rgba(255, 255, 255, 0.42) 16%,
        rgba(0, 0, 0, 0.08) 29%,
        rgba(255, 255, 255, 0) 52%
      );
    }

    .calendar-page.peel-br .calendar-fold-shade {
      background: radial-gradient(
        circle at right bottom,
        rgba(0, 0, 0, 0.20) 0%,
        rgba(255, 255, 255, 0.42) 16%,
        rgba(0, 0, 0, 0.08) 29%,
        rgba(255, 255, 255, 0) 52%
      );
    }

    .calendar-page.peel-b .calendar-fold-shade {
      background: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.18) 0%,
        rgba(255, 255, 255, 0.48) 13%,
        rgba(0, 0, 0, 0.07) 25%,
        rgba(255, 255, 255, 0) 45%
      );
    }

    /* Only the two lower corners and the lower edge can peel. */
    .calendar-peel-handle {
      position: absolute;
      z-index: 5;
      cursor: none;
      touch-action: none;
    }

    .calendar-peel-handle[data-peel="bl"] {
      left: 0;
      bottom: 0;
      width: 76px;
      height: 76px;
    }

    .calendar-peel-handle[data-peel="br"] {
      right: 0;
      bottom: 0;
      width: 76px;
      height: 76px;
    }

    .calendar-peel-handle[data-peel="b"] {
      left: 76px;
      right: 76px;
      bottom: 0;
      height: 58px;
    }

    .calendar-page.is-detached .calendar-peel-handle {
      display: none;
    }

    .calendar-rotate-indicator {
      position: absolute;
      display: none;
      z-index: 999;
      width: 50px;
      height: 50px;
      border: 2px solid #111;
      border-radius: 50%;
      background: #fff;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      line-height: 1;
      transform: translate(-50%, -50%);
      pointer-events: none;
      user-select: none;
    }

    .calendar-surface.is-rotating .calendar-rotate-indicator {
      display: flex;
    }

    .calendar-empty-tip {
      display: none;
    }

    .calendar-work-view .work-title-wrap,
    .calendar-work-view .work-meta {
      position: relative;
      z-index: 1;
    }


    /* =========================
       AUTO VIDEO EDGE FIX / SAME FRAME PRINCIPLE
       Existing inline autoVideo items use the unified crop approach.
    ========================= */

    .work-auto-video-frame {
      display: block;
      width: 100%;
      overflow: hidden;
      border: 2px solid #111;
      background: #111;
      line-height: 0;
    }

    .work-auto-video {
      display: block;
      width: calc(100% + 4px);
      height: auto;
      margin: -2px -2px -3px;
      border: 0;
      background: #111;
      object-fit: cover;
    }

    .calendar-after-meta-images {
      position: relative;
      z-index: 1;
      margin-bottom: 34px;
    }

    /* =========================
       CALENDAR / PROJECTED LIGHT THROUGH PUNCHED HOLES
    ========================= */

    /*
      The page stack remains visually unchanged while idle.
      Only during peeling, the lifted top sheet receives a temporary paper body:
      this prevents the projected light from leaking through every transparent
      part of the PNG and makes light visible only through the opening.
    */
    .calendar-temporary-paper {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: #ffffff;
      opacity: var(--temporary-paper-opacity, 0);
      transition: opacity 0.08s ease;
    }

    .calendar-page.peel-bl .calendar-temporary-paper {
      clip-path: polygon(
        0 0,
        100% 0,
        100% 100%,
        var(--fold-size, 0px) 100%,
        0 calc(100% - var(--fold-size, 0px))
      );
    }

    .calendar-page.peel-br .calendar-temporary-paper {
      clip-path: polygon(
        0 0,
        100% 0,
        100% calc(100% - var(--fold-size, 0px)),
        calc(100% - var(--fold-size, 0px)) 100%,
        0 100%
      );
    }

    .calendar-page.peel-b .calendar-temporary-paper {
      clip-path: polygon(
        0 0,
        100% 0,
        100% calc(100% - var(--fold-height, 0px)),
        0 calc(100% - var(--fold-height, 0px))
      );
    }

    .calendar-passed-light {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      overflow: hidden;
      transform:
        translate(var(--projection-shift-x, 0px), var(--projection-shift-y, 0px))
        rotate(var(--projection-rotation, 0deg));
      transform-origin: center center;
      transition: opacity 0.08s ease;
    }

    .calendar-page.has-passed-light .calendar-passed-light {
      opacity: var(--projection-opacity, 0);
    }

    /* Cast shadow of the lifted sheet: sharper than the previous glow,
       with a cool daylight temperature matching the photographed reference. */
    .calendar-passed-light::before {
      content: "";
      position: absolute;
      inset: -10%;
      background:
        linear-gradient(
          var(--shadow-angle, 154deg),
          rgba(55, 75, 93, 0) 0%,
          rgba(55, 75, 93, 0.07) 22%,
          rgba(47, 66, 84, 0.39) 38%,
          rgba(47, 66, 84, 0.46) 58%,
          rgba(47, 66, 84, 0.17) 72%,
          rgba(55, 75, 93, 0) 100%
        );
      filter: blur(4px);
      mix-blend-mode: multiply;
    }

    /* Bright projections from the punched holes.
       The repeat grid follows the perforation structure of the calendar. */
    .calendar-passed-light::after {
      content: "";
      position: absolute;
      left: 13%;
      right: 13%;
      top: 20%;
      bottom: 8%;
      background-image:
        radial-gradient(
          ellipse 7px 12px at center,
          rgba(255, 255, 252, 0.99) 0%,
          rgba(255, 255, 252, 0.98) 36%,
          rgba(239, 249, 255, 0.80) 51%,
          rgba(239, 249, 255, 0) 76%
        );
      background-repeat: repeat;
      background-size: calc(100% / 7) calc(100% / 6);
      background-position: center center;
      filter: blur(0.45px);
      transform:
        skewY(var(--dot-skew, -4deg))
        translateY(var(--dot-drop, 0px));
      mix-blend-mode: screen;
    }

    /* =========================
       CALENDAR / SINGLE BOTTOM-EDGE PEEL
       The successful central peel becomes the only interaction.
    ========================= */

    .calendar-peel-bottom-edge {
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      width: auto !important;
      height: 78px !important;
    }

    /* =========================
       TANGO / INFINITE VERTICAL LOOP
    ========================= */

    .tango-infinite-segment {
      width: 100%;
      min-width: 0;
    }

    .tango-infinite-clone {
      margin-top: 0;
    }

    /* =========================
       CALENDAR / TOP CONTROLS + TRASH
    ========================= */

    .calendar-work-view .calendar-control-row {
      position: sticky;
      top: 0;
      z-index: 120;
      margin-top: 0;
      min-height: 88px;
      color: #111111;
      mix-blend-mode: normal;
      pointer-events: none;
    }

    .calendar-work-view .calendar-control-hint {
      color: #111111;
      pointer-events: none;
    }

    .calendar-work-view .calendar-reset,
    .calendar-work-view .calendar-trash {
      pointer-events: auto;
    }

    .calendar-control-tools {
      position: relative;
      z-index: 80;
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 18px;
    }

    .calendar-trash {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 66px;
      cursor: none;
      user-select: none;
      transition: transform 0.12s ease;
    }

    .calendar-trash svg {
      display: block;
      width: 52px;
      height: 62px;
      overflow: visible;
    }

    .calendar-trash path,
    .calendar-trash line,
    .calendar-trash rect {
      fill: none;
      stroke: currentColor;
      stroke-width: 3;
      stroke-linecap: square;
      stroke-linejoin: miter;
      transition: stroke 0.12s ease, fill 0.12s ease;
    }

    .calendar-trash.is-ready {

    /* =========================

    /*
      On the cover only, the projected hole pattern comes from the supplied
      light-mask file rather than the generic generated dot grid.
      The cover itself never receives the temporary white-paper backing.
    */
    .calendar-page.is-cover-projection .calendar-passed-light::after {
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      background-image: none;
      background-color: rgba(236, 249, 255, 0.98);
      -webkit-mask-image: var(--cover-light-mask);
      mask-image: var(--cover-light-mask);
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-size: 100% 100%;
      mask-size: 100% 100%;
      -webkit-mask-position: center center;
      mask-position: center center;
      filter: blur(1px);
      transform:
        perspective(600px)
        rotateX(var(--mask-tilt, 5deg))
        skewY(var(--dot-skew, -4deg))
        translateY(var(--dot-drop, 0px));
      transform-origin: top center;
      mix-blend-mode: screen;

    /* =========================

    .compact-index-top {

    /*
      Hide custom cursors only on actual touch/coarse-pointer devices.
      A narrow desktop browser still enters LIST mode, but keeps its black dot cursor.
    */
    @media (hover: none), (pointer: coarse) {
      body.is-compact-index .cursor-ufo,
      body.is-compact-index .cursor-helper-dot {
        display: none !important;
      }
    }

    /* =========================
       COMPACT LIST / SINGLE-COLUMN INDEX
       Same type size, more physical reading space.
    ========================= */

    body.is-compact-index {
      --compact-pad: clamp(20px, 5.6vw, 24px);
    }

    /* Remove double margin: compact pages use one internal margin only. */
    body.is-compact-index .page {

    }

    body.is-compact-index .works-list-panel,
    body.is-compact-index .door-panel.is-list-view .works-list-panel {

    body.is-compact-index .compact-index-head {

    }

    body.is-compact-index .works-list-grid {
      margin: 0 var(--compact-pad);
    }

    /*
      Each work becomes a vertical index entry.
      Date / title / category retain identical type size;
      hierarchy is created only by sequence, spacing and rules.
    */
    body.is-compact-index .works-list-row {
      display: grid;
      grid-template-columns: 1fr;
      column-gap: 0;
      row-gap: 5px;
      min-width: 0;
      padding: 16px 0 20px;

    }

    body.is-compact-index .work-top-button {
      left: var(--compact-pad) !important;
      bottom: var(--compact-pad) !important;
    }

    /* =========================
       COMPACT DETAIL / LIST-ONLY NAVIGATION
       Mobile and narrow windows read projects from LIST, not from the dress-up room.
    ========================= */

    body.is-compact-index.is-compact-work-open .work-close-row {
      display: none !important;
    }

    body.is-compact-index.is-compact-work-open .work-title-wrap {

    body.is-compact-index.is-compact-work-open .work-meta {

        display: none;

    /* =========================

       Compact index begins from the same vertical line.
    ========================= */

    body.is-compact-index {
      --compact-header-top: 60px;
    }

    body.is-compact-index .works-list-panel,
    body.is-compact-index .door-panel.is-list-view .works-list-panel {

    /* =========================
       DESKTOP / DISCOVERED NAVIGATION
       Before first play: a plain instruction only.
       After first play: LIST / DOOR become mode navigation.
    ========================= */

    .door-guide {
      z-index: 91;
      cursor: default;
    }

    .door-guide-label {
      position: relative;
      display: inline-block;
      padding-bottom: 4px;
      border-bottom: 0 !important;
      transform: translateY(0);
      opacity: 1;
    }

    .door-guide-label::after,
    .door-view-toggle::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      display: block;
      width: 100%;
      height: 3px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: left center;
      transition: none;
    }

    .door-view-toggle {
      border-bottom: 0 !important;
      position: absolute;
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition:
        opacity 0.18s ease,
        transform 0.22s cubic-bezier(.22, .72, .18, 1);
    }

    .door-panel.has-discovered-nav .door-view-toggle {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .door-panel.has-discovered-nav .door-guide {
      cursor: none;
    }

    /* Current state only: in Playground the right word is selected. */
    .door-panel.has-discovered-nav:not(.is-list-view) .door-view-toggle::after {
      transform: scaleX(1);
    }

    /* Current state only: in List the left word is selected. */
    .door-panel.has-discovered-nav.is-list-view .door-guide-label::after {
      transform: scaleX(1);
    }

    .door-guide.is-transforming-out .door-guide-label {
      animation: guideTextOut 0.06s cubic-bezier(.4, 0, 1, 1) both;
    }

    .door-guide.is-transforming-in .door-guide-label {
      animation: guideTextIn 0.09s cubic-bezier(.15, .82, .22, 1) both;
    }

    .door-view-toggle.is-transforming-in {
      animation: discoveredModeIn 0.11s cubic-bezier(.15, .82, .22, 1) both;
    }

    @keyframes guideTextOut {
      from {
        opacity: 1;
        transform: translateY(0);
      }
      to {
        opacity: 0;
        transform: translateY(-12px);
      }
    }

    @keyframes guideTextIn {
      from {
        opacity: 0;
        transform: translateY(13px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes discoveredModeIn {
      from {
        opacity: 0;
        transform: translateY(13px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /*
      In LIST mode the guide has become the LIST navigation item,
      so it must remain visible above the scrolling index.
    */
    .door-panel.is-list-view.has-discovered-nav .door-guide {
      visibility: visible;
      pointer-events: auto;
    }

    /* TOP is an action, not the selected navigation state. */
    .work-top-button,
    .calendar-work-view .work-top-button {
      padding-bottom: 0 !important;
      border-bottom: 0 !important;
    }

    /* =========================
       TEXT ACTION / HOVER FEEDBACK
       The large cursor remains visible; clickable text confirms the hidden
       hotspot by drawing its underline only when it can be activated.
    ========================= */

    /*
      Navigation underline behavior:
      - idle: underline indicates the current mode
      - hovering the other mode: underline temporarily moves to the target
    */
    .door-panel.has-discovered-nav:not(.is-list-view) .door-guide:hover .door-guide-label::after {
      transform: scaleX(1);
    }

    .door-panel.has-discovered-nav:not(.is-list-view):has(.door-guide:hover) .door-view-toggle::after {
      transform: scaleX(0);
    }

    .door-panel.has-discovered-nav.is-list-view .door-view-toggle:hover::after {
      transform: scaleX(1);
    }

    .door-panel.has-discovered-nav.is-list-view:has(.door-view-toggle:hover) .door-guide-label::after {
      transform: scaleX(0);
    }

    /*
      TOP is an action rather than a mode. It has no standing underline;
      the line appears only when the real clickable hotspot reaches it.
    */
    .work-top-button::after,
    .calendar-work-view .work-top-button::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -4px;
      height: 3px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: left center;
      transition: none;
      pointer-events: none;
    }

    .work-top-button:hover::after,
    .calendar-work-view .work-top-button:hover::after {
      transform: scaleX(1);
    }

    /* =========================

    ========================= */

    .silkscreen-card {
      position: relative;
      display: block;
      width: 100%;

    /* =========================
       MOBILE FIX / SCROLL, STABLE MEDIA FRAMES, TANGO
       Mobile pages are vertical documents. Media frames use black padding
       instead of borders/outline to avoid uneven Safari sub-pixel rendering.
    ========================= */

    @media (max-width: 780px), (hover: none), (pointer: coarse) {
      html,
      body,
      body.is-compact-index,
      body.is-compact-index .page,
      body.is-compact-index .main,
      body.is-compact-index .info-wrap,
      body.is-compact-index .info-panel,

      body.is-compact-index .works-list-panel,
      body.is-compact-index .work-detail {
        width: 100%;
        max-width: 100%;

    function fallbackCopyText(value) {
      const textArea = document.createElement("textarea");
      textArea.value = value;
      textArea.setAttribute("readonly", "");
      textArea.style.position = "fixed";
      textArea.style.left = "-9999px";
      textArea.style.top = "0";
      document.body.appendChild(textArea);
      textArea.select();
      try {
        document.execCommand("copy");
      } catch (error) {
        /* If copy fails, the visual feedback still keeps the interaction calm. */
      }
      document.body.removeChild(textArea);
      return Promise.resolve();
    }

    function copyTargetText(target) {
      if (!target) {
        return;
      }

      const value = target.dataset.copyValue || target.textContent.trim();
      const defaultText = target.dataset.defaultText || target.textContent;
      target.dataset.defaultText = defaultText;

      const copyPromise = navigator.clipboard && window.isSecureContext
        ? navigator.clipboard.writeText(value).catch(() => fallbackCopyText(value))
        : fallbackCopyText(value);

      copyPromise.then(() => {
        target.textContent = "Copied";
        target.classList.add("is-copied");

        if (target.copyResetTimer) {
          window.clearTimeout(target.copyResetTimer);
        }

        target.copyResetTimer = window.setTimeout(() => {
          target.textContent = target.dataset.defaultText || defaultText;
          target.classList.remove("is-copied");
          target.copyResetTimer = null;
        }, 3000);
      });
    }

    document.addEventListener("click", (event) => {
      const target = event.target.closest("[data-copy-value]");
      if (!target) {
        return;
      }

      event.preventDefault();
      copyTargetText(target);
    });

    document.addEventListener("keydown", (event) => {
      const target = event.target.closest("[data-copy-value]");
      if (!target || (event.key !== "Enter" && event.key !== " ")) {
        return;
      }

      event.preventDefault();
      copyTargetText(target);

    function initGoldFoilCard() {
      const card = infoPanel.querySelector(".gold-foil-card");

      if (!card) {
        return;
      }

      const surface = card.querySelector(".gold-foil-surface");
      const canvas = card.querySelector(".gold-foil-canvas");
      const context = canvas.getContext("2d", { willReadFrequently: true });

      if (!surface || !canvas || !context) {
        return;
      }

      const sourceImage = new Image();
      sourceImage.crossOrigin = "anonymous";

      let sourcePixels = null;
      let rotateX = 0;
      let rotateY = 0;
      let lightX = 0;
      let lightY = 0;
      let dragging = false;
      let startPointerX = 0;
      let startPointerY = 0;
      let startRotateX = 0;
      let startRotateY = 0;
      let animationFrame = null;

      const clamp = (value, min, max) =>
        Math.min(max, Math.max(min, value));

      function showFallback() {
        card.innerHTML = `
          <div class="gold-foil-fallback">
            <img src="me.png" alt="portrait">
          </div>
        `;
      }

      function drawGoldFoil() {
        if (!sourcePixels) {
          return;
        }

        const width = canvas.width;
        const height = canvas.height;
        const original = sourcePixels.data;
        const rendered = context.createImageData(width, height);
        const output = rendered.data;

const highlightX = 0.5 + lightX * 0.21 + rotateY / 88;
const highlightY = 0.46 + lightY * 0.14 - rotateX / 96;

        for (let y = 0; y < height; y += 1) {
          const ny = y / height;

          for (let x = 0; x < width; x += 1) {
            const pixelIndex = (y * width + x) * 4;
            const nx = x / width;

            const red = original[pixelIndex];
            const green = original[pixelIndex + 1];
            const blue = original[pixelIndex + 2];
            const luminance =
              red * 0.299 +
              green * 0.587 +
              blue * 0.114;

            const foilMask = Math.pow(
              clamp((luminance - 34) / 221, 0, 1),
              1.38
            );

            const diagonal = nx * 0.78 + ny * 0.34;
            const lightDiagonal = highlightX * 0.78 + highlightY * 0.34;
            const distance = diagonal - lightDiagonal;

            const mainReflection = Math.exp(
              -(distance * distance) / 0.015
            );

            const secondaryReflection = Math.exp(
              -Math.pow(distance + 0.24, 2) / 0.045
            );

            const dx = nx - highlightX;
            const dy = ny - highlightY;
            const ambientReflection = Math.max(
              0,
              1 - Math.sqrt(dx * dx + dy * dy) * 1.65
            );

            const subtleGrain =
              ((Math.sin(x * 0.34 + y * 0.47) + 1) * 0.5) * 0.012;

            const reflection = clamp(
              0.10 +
              mainReflection * 0.60 +
              secondaryReflection * 0.13 +
              ambientReflection * 0.08 +
              subtleGrain,
              0,
              1
            );

            const inkRed = 6 + luminance * 0.15;
            const inkGreen = 6 + luminance * 0.145;
            const inkBlue = 6 + luminance * 0.14;

            const goldRed = 96 + reflection * 142;
            const goldGreen = 72 + reflection * 120;
            const goldBlue = 20 + reflection * 54;

            output[pixelIndex] =
              inkRed * (1 - foilMask) + goldRed * foilMask;
            output[pixelIndex + 1] =
              inkGreen * (1 - foilMask) + goldGreen * foilMask;
            output[pixelIndex + 2] =
              inkBlue * (1 - foilMask) + goldBlue * foilMask;
            output[pixelIndex + 3] = 255;
          }
        }

        context.putImageData(rendered, 0, 0);
      }

      function scheduleDraw() {
        if (animationFrame) {
          cancelAnimationFrame(animationFrame);
        }

        animationFrame = requestAnimationFrame(() => {
          drawGoldFoil();
          animationFrame = null;
        });
      }

      function updateTransform() {
        surface.style.transform =
          `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      }

      function updateLight(event) {
        const bounds = card.getBoundingClientRect();

        lightX = clamp(
          ((event.clientX - bounds.left) / bounds.width) * 2 - 1,
          -1,
          1
        );

        lightY = clamp(
          ((event.clientY - bounds.top) / bounds.height) * 2 - 1,
          -1,
          1
        );

        scheduleDraw();
      }

      sourceImage.addEventListener("load", () => {
        const pixelRatio = Math.min(window.devicePixelRatio || 1, 1.5);
        const renderWidth = Math.round(320 * pixelRatio);
        const goldRatio = sourceImage.naturalHeight && sourceImage.naturalWidth
          ? sourceImage.naturalHeight / sourceImage.naturalWidth
          : 1280 / 853;
        const renderHeight = Math.round(renderWidth * goldRatio);

        canvas.width = renderWidth;
        canvas.height = renderHeight;

        const sourceCanvas = document.createElement("canvas");
        sourceCanvas.width = renderWidth;
        sourceCanvas.height = renderHeight;

        const sourceContext = sourceCanvas.getContext("2d", {
          willReadFrequently: true
        });

        if (!sourceContext) {
          return;
        }

        try {
          sourceContext.drawImage(sourceImage, 0, 0, renderWidth, renderHeight);
          sourcePixels = sourceContext.getImageData(
            0,
            0,
            renderWidth,
            renderHeight
          );
          drawGoldFoil();
        } catch (error) {
          console.warn(
            "Gold foil canvas could not read me.png. Open the page through Live Server.",
            error
          );
          showFallback();
        }
      });

      sourceImage.addEventListener("error", () => {
        console.warn("me.png could not be loaded.");
        showFallback();
      });

      sourceImage.src = "goldme.png";

      card.addEventListener("pointerdown", (event) => {
        dragging = true;
        card.classList.add("is-dragging");
        card.setPointerCapture(event.pointerId);

        startPointerX = event.clientX;
        startPointerY = event.clientY;
        startRotateX = rotateX;
        startRotateY = rotateY;

        updateLight(event);
      });

      card.addEventListener("pointermove", (event) => {
        updateLight(event);

        if (!dragging) {
          return;
        }

        rotateY = clamp(
  startRotateY + (event.clientX - startPointerX) * 0.105,
  -13,
  13
);

rotateX = clamp(
  startRotateX - (event.clientY - startPointerY) * 0.08,
  -10,
  10
);

        updateTransform();
        scheduleDraw();
      });

      function finishDragging(event) {
        if (!dragging) {
          return;
        }

        dragging = false;
        card.classList.remove("is-dragging");

        if (event && card.hasPointerCapture(event.pointerId)) {
          card.releasePointerCapture(event.pointerId);
        }
      }

      card.addEventListener("pointerup", finishDragging);
      card.addEventListener("pointercancel", finishDragging);

      card.addEventListener("mouseleave", () => {
        if (dragging) {
          return;
        }

        lightX = 0;
        lightY = 0;
        scheduleDraw();
      });

      card.addEventListener("dblclick", () => {
        rotateX = 0;
        rotateY = 0;
        lightX = 0;
        lightY = 0;
        updateTransform();
        scheduleDraw();
      });
    }


    function initFunhouseCard() {
      const card = infoPanel.querySelector(".funhouse-card");

      if (!card) {
        return;
      }

      const canvas = card.querySelector(".funhouse-canvas");
      const rainbowLight = card.querySelector(".funhouse-rainbow-light");
      const context = canvas.getContext("2d", { willReadFrequently: true });

      if (!canvas || !context) {
        return;
      }

      const sourceImage = new Image();
      sourceImage.crossOrigin = "anonymous";

      const radius = 92;
      const strength = 0.42;
      let sourcePixels = null;
      let active = false;
      let pointerX = 0;
      let pointerY = 0;
      let raf = null;

      function drawBase() {
        if (!sourcePixels) return;
        context.putImageData(sourcePixels, 0, 0);
      }

      function sampleNearest(data, width, height, x, y) {
        const sx = Math.max(0, Math.min(width - 1, Math.round(x)));
        const sy = Math.max(0, Math.min(height - 1, Math.round(y)));
        const index = (sy * width + sx) * 4;
        return [data[index], data[index + 1], data[index + 2], data[index + 3]];
      }

      function render() {
        raf = null;

        if (!sourcePixels) return;

        drawBase();

        if (!active) return;

        const width = canvas.width;
        const height = canvas.height;
        const original = sourcePixels.data;
        const output = context.getImageData(0, 0, width, height);
        const out = output.data;

        const minX = Math.max(0, Math.floor(pointerX - radius));
        const maxX = Math.min(width - 1, Math.ceil(pointerX + radius));
        const minY = Math.max(0, Math.floor(pointerY - radius));
        const maxY = Math.min(height - 1, Math.ceil(pointerY + radius));

        for (let y = minY; y <= maxY; y += 1) {
          for (let x = minX; x <= maxX; x += 1) {
            const dx = x - pointerX;
            const dy = y - pointerY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist >= radius) {
              continue;
            }

            const t = 1 - dist / radius;
            const bulge = 1 - strength * Math.pow(t, 1.55);
            const sourceX = pointerX + dx * bulge;
            const sourceY = pointerY + dy * bulge;

            const feather = Math.pow(t, 1.1);
            const targetIndex = (y * width + x) * 4;
            const [sr, sg, sb, sa] = sampleNearest(original, width, height, sourceX, sourceY);

            out[targetIndex] = sr * feather + out[targetIndex] * (1 - feather);
            out[targetIndex + 1] = sg * feather + out[targetIndex + 1] * (1 - feather);
            out[targetIndex + 2] = sb * feather + out[targetIndex + 2] * (1 - feather);
            out[targetIndex + 3] = sa;
          }
        }

        context.putImageData(output, 0, 0);
      }

      function requestRender() {
        if (!raf) {
          raf = requestAnimationFrame(render);
        }
      }

      function updatePointer(event) {
        const bounds = canvas.getBoundingClientRect();
        const scaleX = canvas.width / bounds.width;
        const scaleY = canvas.height / bounds.height;
        pointerX = (event.clientX - bounds.left) * scaleX;
        pointerY = (event.clientY - bounds.top) * scaleY;
      }

      function updateRainbowLight(event) {
        if (!rainbowLight) {
          return;
        }

        const bounds = card.getBoundingClientRect();
        const x = ((event.clientX - bounds.left) / bounds.width) * 100;
        const y = ((event.clientY - bounds.top) / bounds.height) * 100;

        card.style.setProperty("--ufo-x", `${x}%`);
        card.style.setProperty("--ufo-y", `${y}%`);
      }

      function reset() {
        active = false;
        card.classList.remove("is-ufo-light-active");
        requestRender();
      }

      sourceImage.onload = () => {
        const pixelRatio = Math.min(window.devicePixelRatio || 1, 1.5);
        const renderWidth = Math.round(320 * pixelRatio);
        const renderHeight = Math.round(renderWidth * 2048 / 1365);

        canvas.width = renderWidth;
        canvas.height = renderHeight;

        context.clearRect(0, 0, renderWidth, renderHeight);
        context.drawImage(sourceImage, 0, 0, renderWidth, renderHeight);
        sourcePixels = context.getImageData(0, 0, renderWidth, renderHeight);
        drawBase();
      };

      sourceImage.onerror = () => {
        card.innerHTML = `<img class="profile-photo" src="me.png" alt="portrait">`;
      };

      card.addEventListener("pointerenter", (event) => {
        if (!sourcePixels) return;
        active = true;
        card.classList.add("is-ufo-light-active");
        updatePointer(event);
        updateRainbowLight(event);
        requestRender();
      });

      card.addEventListener("pointermove", (event) => {
        if (!sourcePixels) return;
        active = true;
        card.classList.add("is-ufo-light-active");
        updatePointer(event);
        updateRainbowLight(event);
        requestRender();
      });

      card.addEventListener("pointerleave", reset);

      sourceImage.src = "me.png";
    }

      const touchPointers = new Map();

      const stackState = {
        x: 0,
        y: 0,
        rotation: 0
      };

      const clamp = (value, min, max) =>
        Math.min(max, Math.max(min, value));

      function normalizeRotation(value) {
        let angle = value % 360;
        if (angle > 180) angle -= 360;
        if (angle < -180) angle += 360;
        return angle;
      }

      function snapOriginalAngle(value) {
        const angle = normalizeRotation(value);
        return Math.abs(angle) < 9 ? 0 : angle;
      }

      function attachedPages() {
        return pages.filter((page) =>
          !page._calendarState.detached && !page._calendarState.discarded
        );

          light.style.removeProperty("--dot-drop");
          light.style.removeProperty("--cover-light-mask");
          light.style.removeProperty("--mask-tilt");

      function updatePassedLight(peelMode, amount) {

        const nextPage = attachedPages()[1];

        if (!liftedPage || !nextPage || amount <= 0.01) {

          is projected onto the page below, so the light survives without
          introducing a white backing behind the cover artwork.

        if (!isCoverPage) {

        if (!light) {
          return;

        const emergence = clamp((amount - 0.04) / 0.48, 0, 1);

        nextPage.classList.add("has-passed-light");

        if (isCoverPage && coverLightMask) {
          nextPage.classList.add("is-cover-projection");
          light.style.setProperty("--cover-light-mask", `url("${coverLightMask}")`);
          light.style.setProperty("--mask-tilt", `${4 + amount * 7}deg`);
        }

        light.style.setProperty("--projection-opacity", String(emergence * 0.98));
        light.style.setProperty("--projection-shift-x", `${direction * (10 + amount * 28)}px`);
        light.style.setProperty("--projection-shift-y", `${12 + amount * 42}px`);
        light.style.setProperty("--projection-rotation", `${direction * (3 + amount * 7)}deg`);
        light.style.setProperty("--shadow-angle", `${154 + direction * 17}deg`);
        light.style.setProperty("--dot-skew", `${-3 + direction * 5}deg`);
        light.style.setProperty("--dot-drop", `${amount * 9}px`);

      function resetFoldVisual(page) {
        const state = page._calendarState;

        state.peelAmount = 0;
        state.peelMode = null;
        state.foldSize = 0;
        state.foldHeight = 0;
        state.peelShiftX = 0;
        state.peelShiftY = 0;
        state.flapX = 0;
        state.flapY = 0;
        state.foldOpacity = 0;

      function updateFoldVisual(page) {

        page.classList.toggle("peel-bl", state.peelMode === "bl");
        page.classList.toggle("peel-br", state.peelMode === "br");
        page.classList.toggle("peel-b", state.peelMode === "b");

        page.style.setProperty("--fold-height", `${state.foldHeight || 0}px`);
        page.style.setProperty("--peel-shift-x", `${state.peelShiftX || 0}px`);
        page.style.setProperty("--peel-shift-y", `${state.peelShiftY || 0}px`);
        page.style.setProperty("--flap-x", `${state.flapX || 0}deg`);
        page.style.setProperty("--flap-y", `${state.flapY || 0}deg`);

      function setPageTransform(page) {
        const state = page._calendarState;
        const position = state.detached ? state : stackState;

        page.style.left = `${position.x}px`;
        page.style.top = `${position.y}px`;
        page.style.transform = `rotate(${position.rotation}deg)`;
        updateFoldVisual(page);

      function setAllTransforms() {
        pages.forEach(setPageTransform);
      }

      function setSelection(target) {
        pages.forEach((page) => page.classList.remove("is-selected"));
        selectedTarget = target;

        if (target.type === "page" && target.page) {
          target.page.classList.add("is-selected");
        } else {
          const topPage = topAttachedPage();
          if (topPage) {
            topPage.classList.add("is-selected");

      function refreshAccessiblePages() {

            discarded: false,

            y: start.y,

            peelMode: null,

            foldHeight: 0,

            peelShiftY: 0,

            flapY: 0,

            "is-partially-peeled",

            "is-discarded",

      function centerOfTarget(target) {

        const overlapY = Math.max(

        rotateIndicator.style.top = `${y - rect.top}px`;

      function startTwoFingerRotation(target) {

    function getWorkScrollTargets() {
      const baseTargets = [
        infoPanel,
        infoWrap,
        document.querySelector(".info-panel"),
        document.querySelector(".info-wrap"),
        document.querySelector(".work-detail"),
        document.scrollingElement,
        document.documentElement,
        document.body
      ].filter(Boolean);

      const innerScrollableTargets = infoWrap
        ? Array.from(infoWrap.querySelectorAll("*"))
            .filter((element) => {
              return (element.scrollHeight > element.clientHeight + 2) ||
                     (element.scrollWidth > element.clientWidth + 2);
            })
        : [];

      return Array.from(new Set([...baseTargets, ...innerScrollableTargets]));
    }

    function setScrollTargetTop(target, topValue) {
      if (!target) {
        return;
      }

      try {
        target.scrollTop = topValue;
        target.scrollLeft = 0;
      } catch (error) {}

      try {
        if (typeof target.scrollTo === "function") {
          target.scrollTo({ top: topValue, left: 0, behavior: "auto" });
        }
      } catch (error) {}
    }

    function animateWorkPanelToTop() {
      const targets = getWorkScrollTargets();
      const startValues = new Map();
      let maxStartTop = 0;

      targets.forEach((target) => {
        const topValue = Number(target.scrollTop || 0);
        startValues.set(target, topValue);
        maxStartTop = Math.max(maxStartTop, topValue);
      });

      try {
        maxStartTop = Math.max(maxStartTop, Number(window.scrollY || 0));
      } catch (error) {}

      if (maxStartTop <= 1) {
        targets.forEach((target) => setScrollTargetTop(target, 0));
        try { window.scrollTo(0, 0); } catch (error) {}
        return;
      }

      const duration = 520;
      const startTime = performance.now();
      const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);

      function step(now) {
        const progress = Math.min(1, (now - startTime) / duration);
        const eased = easeOutCubic(progress);

        targets.forEach((target) => {
          const from = startValues.get(target) || 0;
          const nextTop = Math.round(from * (1 - eased));
          setScrollTargetTop(target, nextTop);
        });

        try {
          const nextWindowTop = Math.round((window.scrollY || 0) * (1 - eased));
          window.scrollTo(0, nextWindowTop);
        } catch (error) {}

        if (progress < 1) {
          requestAnimationFrame(step);
        } else {
          targets.forEach((target) => setScrollTargetTop(target, 0));
          try { window.scrollTo(0, 0); } catch (error) {}
        }
      }

      requestAnimationFrame(step);
    }

    function initSilkscreenPaintCard() {
      const card = infoPanel.querySelector(".silkscreen-card");
      const canvas = card ? card.querySelector(".silkscreen-ink-canvas") : null;
      const image = card ? card.querySelector("img") : null;

      if (!card || !canvas || !image) {
        return;
      }

      const context = canvas.getContext("2d");
      const inkColor = "#e60012";
      let dragging = false;
      let lastPoint = null;

      function resizeCanvas() {
        const rect = card.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        const previous = document.createElement("canvas");

        previous.width = canvas.width;
        previous.height = canvas.height;

        if (canvas.width && canvas.height) {
          previous.getContext("2d").drawImage(canvas, 0, 0);
        }

        canvas.width = Math.max(1, Math.round(rect.width * dpr));
        canvas.height = Math.max(1, Math.round(rect.height * dpr));
        context.setTransform(dpr, 0, 0, dpr, 0, 0);

        if (previous.width && previous.height) {
          context.drawImage(previous, 0, 0, rect.width, rect.height);
        }
      }

      function pointFromEvent(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: event.clientX - rect.left,
          y: event.clientY - rect.top
        };
      }

      function getTrailedPoint(basePoint, otherPoint, trailDistance) {
        const dx = otherPoint.x - basePoint.x;
        const dy = otherPoint.y - basePoint.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (!distance) {
          return { x: basePoint.x, y: basePoint.y };
        }

        const unitX = dx / distance;
        const unitY = dy / distance;

        return {
          x: basePoint.x - unitX * trailDistance,
          y: basePoint.y - unitY * trailDistance
        };
      }

      function pullInk(from, to) {
        const rect = canvas.getBoundingClientRect();
        const squeegeeWidth = Math.max(30, rect.width * 0.18);
        const trailDistance = squeegeeWidth * 0.55;

        /*
          The cursor/wooden board remains at the real pointer position.
          The pigment is laid slightly behind the direction of travel, so
          it feels like the ink is being pulled as a tail behind the board.
        */
        const trailingFrom = getTrailedPoint(from, to, trailDistance);
        const trailingTo = getTrailedPoint(to, from, trailDistance);

        context.save();
        context.globalCompositeOperation = "source-over";
        context.fillStyle = inkColor;
        context.strokeStyle = inkColor;
        context.lineCap = "square";
        context.lineJoin = "round";
        context.lineWidth = squeegeeWidth;
        context.globalAlpha = 0.98;

        context.beginPath();
        context.moveTo(trailingFrom.x, trailingFrom.y);
        context.lineTo(trailingTo.x, trailingTo.y);
        context.stroke();

        context.fillRect(
          trailingTo.x - squeegeeWidth / 2,
          trailingTo.y - squeegeeWidth / 2,
          squeegeeWidth,
          squeegeeWidth
        );

        context.restore();
      }

      function startPaint(event) {
        if (event.button !== 0) {
          return;
        }

        event.preventDefault();
        syncVisualCursorFromPointerEvent(event);
        dragging = true;
        lastPoint = pointFromEvent(event);
        canvas.setPointerCapture(event.pointerId);
        pullInk(lastPoint, lastPoint);
      }

      function movePaint(event) {
        syncVisualCursorFromPointerEvent(event);

        if (!dragging) {
          return;
        }

        event.preventDefault();
        const nextPoint = pointFromEvent(event);
        pullInk(lastPoint, nextPoint);
        lastPoint = nextPoint;
      }

      function endPaint(event) {
        syncVisualCursorFromPointerEvent(event);

        if (!dragging) {
          return;
        }

        dragging = false;
        lastPoint = null;

        if (canvas.hasPointerCapture(event.pointerId)) {
          canvas.releasePointerCapture(event.pointerId);
        }
      }

      if (image.complete) {
        resizeCanvas();
      } else {
        image.addEventListener("load", resizeCanvas, { once: true });
      }

      canvas.addEventListener("pointerdown", startPaint);
      canvas.addEventListener("pointermove", movePaint);
      canvas.addEventListener("pointerup", endPaint);
      canvas.addEventListener("pointercancel", endPaint);

      window.addEventListener("resize", resizeCanvas, { passive: true });
    }

    function initTangoInfiniteLoop() {
      const original = infoPanel.querySelector(".work-detail");
      if (!original) {

      original.classList.add("tango-infinite-segment");

      const clone = original.cloneNode(true);
      clone.classList.add("tango-infinite-segment", "tango-infinite-clone");
      clone.setAttribute("aria-hidden", "true");

      clone.querySelectorAll(".work-top-button").forEach((button) => {
        button.remove();

      clone.querySelectorAll("img").forEach((image) => {
        image.loading = "eager";
      });

      infoPanel.appendChild(clone);

      let isWrapping = false;

      tangoInfiniteScrollHandler = () => {
        if (isWrapping) {
          return;
        }

        const segmentHeight = original.offsetHeight;
        if (!segmentHeight) {
          return;
        }

        if (infoPanel.scrollTop >= segmentHeight) {
          isWrapping = true;
          infoPanel.scrollTop -= segmentHeight;
          isWrapping = false;
        }
      };

      infoPanel.addEventListener("scroll", tangoInfiniteScrollHandler);

    function prepareVideoFirstFrame(video) {
      if (!video || video.dataset.firstFramePrepared === "true") {
        return;
      }

      video.dataset.firstFramePrepared = "true";
      video.preload = "auto";

      const seekToVisibleFrame = () => {
        try {
          if (!Number.isFinite(video.duration) || video.duration <= 0) {
            return;
          }

          const targetTime = Math.min(0.08, Math.max(0, video.duration - 0.04));

          if (Math.abs(video.currentTime - targetTime) > 0.025) {
            video.currentTime = targetTime;
          }
        } catch (error) {}
      };

      video.addEventListener("loadedmetadata", seekToVisibleFrame, { once: true });
      video.addEventListener("loadeddata", seekToVisibleFrame, { once: true });
      video.addEventListener("seeked", () => {
        if (!video.autoplay) {
          video.pause();
        }
      }, { once: true });

      try {
        video.load();
      } catch (error) {}
    }

    function scheduleVideoStillFramePrep() {
      const videosNeedingStillFrame = infoPanel.querySelectorAll(
        ".hover-play-group video, .work-manual-video"
      );

      if (!videosNeedingStillFrame.length) {
        return;
      }

      const prepare = () => {
        videosNeedingStillFrame.forEach(prepareVideoFirstFrame);
      };

      if ("requestIdleCallback" in window) {
        window.requestIdleCallback(prepare, { timeout: 900 });
      } else {
        window.setTimeout(prepare, 180);
      }
    }

    function clearBigfootFootprints() {

    function spawnBigfootFootprint(clientX, clientY) {
      if (!pageFootprints || !mainArea) {
        return;
      }

      const mainRect = mainArea.getBoundingClientRect();
      const layerRect = pageFootprints.getBoundingClientRect();

      if (
        clientX < mainRect.left ||
        clientX > mainRect.right ||
        clientY < mainRect.top ||
        clientY > mainRect.bottom
      ) {
        return;
      }

      const footprint = document.createElement("img");
      footprint.className = "page-footprint";
      footprint.src = "image-18.png";
      footprint.alt = "";
      footprint.draggable = false;

      footprint.style.left = `${clientX - layerRect.left}px`;
      footprint.style.top = `${clientY - layerRect.top}px`;
      footprint.style.setProperty(
        "--footprint-rotation",
        `${-18 + Math.random() * 36}deg`
      );

      pageFootprints.appendChild(footprint);
      bigfootFootprints.push(footprint);

      if (bigfootFootprints.length > MAX_BIGFOOT_FOOTPRINTS) {
        const oldest = bigfootFootprints.shift();

        if (oldest) {
          oldest.classList.add("is-fading");
          setTimeout(() => oldest.remove(), 220);
        }
      }
    }
